<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="luxeGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="30%" stop-color="#e5c158"/>
      <stop offset="50%" stop-color="#fff8db"/>
      <stop offset="70%" stop-color="#e5c158"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <!-- Outer luxury circle -->
  <circle cx="50" cy="50" r="44" stroke="url(#luxeGold)" stroke-width="2" stroke-dasharray="2 2" opacity="0.8"/>
  <circle cx="50" cy="50" r="40" stroke="url(#luxeGold)" stroke-width="1.5"/>

  <!-- Elegant Diamond Crown -->
  <path d="M 30,45 C 30,35 50,30 50,30 C 50,30 70,35 70,45 C 70,55 50,75 50,75 C 50,75 30,55 30,45 Z" stroke="url(#luxeGold)" stroke-width="2" fill="url(#luxeGold)" fill-opacity="0.05"/>
  
  <!-- Facets of the diamond -->
  <line x1="50" y1="30" x2="50" y2="75" stroke="url(#luxeGold)" stroke-width="1.5"/>
  <line x1="30" y1="45" x2="70" y2="45" stroke="url(#luxeGold)" stroke-width="1.5"/>
  
  <line x1="50" y1="30" x2="40" y2="45" stroke="url(#luxeGold)" stroke-width="1"/>
  <line x1="50" y1="30" x2="60" y2="45" stroke="url(#luxeGold)" stroke-width="1"/>
  <line x1="50" y1="75" x2="40" y2="45" stroke="url(#luxeGold)" stroke-width="1"/>
  <line x1="50" y1="75" x2="60" y2="45" stroke="url(#luxeGold)" stroke-width="1"/>
  
  <!-- Sparkles -->
  <path d="M 50,15 L 50,25 M 45,20 L 55,20" stroke="url(#luxeGold)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Side accent dots -->
  <circle cx="20" cy="50" r="2" fill="url(#luxeGold)"/>
  <circle cx="80" cy="50" r="2" fill="url(#luxeGold)"/>
</svg>
